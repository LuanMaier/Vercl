<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview — WebViz Explorer</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        display: flex;
        gap: 10px;
        height: 100vh;
        padding: 10px;
        background: #0a0a09;
        font-family: system-ui, sans-serif;
        color: #888;
      }

      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
      }

      .panel--desktop {
        flex: 1;
      }

      .panel--mobile {
        width: 406px;
        flex-shrink: 0;
      }

      .label {
        padding: 4px 6px 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(200, 169, 110, 0.75);
      }

      .frame-wrap {
        flex: 1;
        min-height: 0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        overflow: hidden;
        background: #000;
      }

      .panel--mobile .frame-wrap {
        width: 390px;
        margin: 0 auto;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div class="panel panel--desktop">
      <div class="label">Desktop — site padrão</div>
      <div class="frame-wrap">
        <iframe src="/" title="Desktop preview"></iframe>
      </div>
    </div>
    <div class="panel panel--mobile">
      <div class="label">Mobile — 390px</div>
      <div class="frame-wrap">
        <iframe src="/" title="Mobile preview"></iframe>
      </div>
    </div>
  </body>
</html>
